syntax = "proto3";

option csharp_namespace = "Veeho.Grpc";

package video;

service VideoService {
  rpc Upload(stream UploadVideoRequest) returns (UploadVideoResponse);
  rpc Download(VideoRequest) returns (stream VideoChunk);
}

message UploadVideoRequest{
	string userId = 1;
	string fileName = 2;
	bytes chunkData = 3;
	int32 chunkIndex = 4;
	bool isLastChunk = 5;
}

message VideoChunk {
  string fileName = 1;
  bytes data = 2;
  int32 chunkNumber = 3;
  int32 totalChunks = 4;
}

message UploadVideoResponse {
  bool success = 1;
  string videoId = 2;
  string message = 3;
}

message VideoRequest{
	string fileName = 1;
}